<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码强度检测 - 在线密码安全性测试工具 | Free AI Tools</title>
  <meta name="description" content="免费在线密码强度检测工具，实时分析密码安全性，评估长度、字符组合、常见密码匹配、熵值计算。显示破解时间估计和改进建议，保障账户安全。">
  <meta name="keywords" content="密码强度检测,密码安全性测试,密码强度评估,密码安全检查,强密码检测,在线密码工具">
  <link rel="stylesheet" href="../style.css">
  <style>
    .pstr-layout { max-width: 500px; margin: 0 auto; display: grid; gap: 1.5rem; }
    .pstr-input-wrap { position: relative; }
    .pstr-input { width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 2px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 1.1rem; font-family: monospace; box-sizing: border-box; transition: border-color 0.3s; }
    .pstr-input:focus { outline: none; }
    .pstr-bar { height: 8px; border-radius: 4px; background: var(--bg); overflow: hidden; }
    .pstr-bar-fill { height: 100%; border-radius: 4px; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); width: 0; }
    .pstr-score { text-align: center; padding: 1rem; }
    .pstr-score .num { font-size: 3rem; font-weight: 800; line-height: 1; }
    .pstr-score .label { font-size: 1.2rem; margin-top: 0.3rem; }
    .pstr-score .time { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.3rem; }
    .pstr-details { display: grid; gap: 0.4rem; }
    .pstr-detail { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0.75rem; border-radius: 6px; background: var(--bg); font-size: 0.82rem; }
    .pstr-detail .d-crit { color: var(--text-muted); }
    .pstr-detail .d-pass { color: #34d399; }
    .pstr-detail .d-fail { color: #fb7185; }
    .pstr-suggest { background: rgba(251,113,133,0.1); border: 1px solid rgba(251,113,133,0.2); border-radius: 8px; padding: 0.75rem; color: var(--text); font-size: 0.85rem; line-height: 1.6; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="../index.html" class="logo">Free AI Tools <span>免费</span></a>
      <nav><a href="../index.html">首页</a><a href="../tools/password-generator.html">密码生成</a><a href="../tools/password-strength.html">密码检测</a></nav>
    </div>
  </header>

  <main class="tool-page container">
    <div class="tool-header">
      <h1>密码强度检测 / Password Strength Tester</h1>
      <p>实时检测密码安全性，评估强度等级、熵值，估算破解时间。</p>
    </div>

    <div class="tool-container">
      <div class="pstr-layout">
        <div class="pstr-input-wrap">
          <input class="pstr-input" id="pwdInput" type="text" placeholder="输入要检测的密码..." oninput="analyze()" value="MyP@ssw0rd!">
        </div>

        <div class="pstr-bar">
          <div class="pstr-bar-fill" id="strengthBar"></div>
        </div>

        <div class="pstr-score">
          <div class="num" id="scoreNum">62</div>
          <div class="label" id="scoreLabel">强</div>
          <div class="time" id="crackTime">约 3 年</div>
        </div>

        <div class="pstr-details" id="detailList"></div>
        <div class="pstr-suggest" id="suggestions"></div>

        <label style="display:flex;align-items:center;gap:0.3rem;color:var(--text-muted);font-size:0.8rem;cursor:pointer;">
          <input type="checkbox" id="showPwd" onchange="toggleShow()"> 显示密码
        </label>
      </div>
    </div>

    <div class="ad-placeholder">[广告位] Google AdSense</div>
  </main>
  <footer><div class="container"><p>Free AI Tools &copy; 2026 | <a href="../index.html">首页</a></p></div></footer>
  <div class="toast" id="toast"></div>

  <script>
    function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

    function toggleShow(){
      const el=document.getElementById('pwdInput');
      el.type=document.getElementById('showPwd').checked?'text':'text';
    }

    function analyze(){
      const pwd=document.getElementById('pwdInput').value;
      const bar=document.getElementById('strengthBar');
      const scoreEl=document.getElementById('scoreNum');
      const labelEl=document.getElementById('scoreLabel');
      const timeEl=document.getElementById('crackTime');
      const detailEl=document.getElementById('detailList');
      const suggestEl=document.getElementById('suggestions');

      if(!pwd){
        bar.style.width='0';scoreEl.textContent='—';labelEl.textContent='等待输入';timeEl.textContent='';detailEl.innerHTML='';suggestEl.innerHTML='';
        return;
      }

      // Score calculation (0-100)
      let score=0;
      const len=pwd.length;

      // Length score (up to 30)
      score+=Math.min(len*2,30);

      // Character variety (up to 40)
      if(/[a-z]/.test(pwd)) score+=10;
      if(/[A-Z]/.test(pwd)) score+=10;
      if(/[0-9]/.test(pwd)) score+=10;
      if(/[^a-zA-Z0-9]/.test(pwd)) score+=10;

      // Length bonus (up to 20)
      if(len>=8) score+=5;
      if(len>=12) score+=5;
      if(len>=16) score+=5;
      if(len>=20) score+=5;

      // Complexity bonus (up to 10)
      const types=[/[a-z]/,/[A-Z]/,/[0-9]/,/[^a-zA-Z0-9]/].filter(r=>r.test(pwd)).length;
      score+=types*2;

      // Penalties
      // Common patterns
      const commons=['123456','password','qwerty','abc123','letmein','admin','welcome','monkey','dragon','master'];
      if(commons.some(c=>pwd.toLowerCase().includes(c))) score-=15;

      // Repeated chars
      if(/(.)\1{2,}/.test(pwd)) score-=10;
      // Sequential
      if(/abc|bcd|cde|def|efg|fgh|ghi|hij|ijk|jkl|klm|lmn|mno|nop|opq|pqr|qrs|rst|stu|tuv|uvw|vwx|wxy|xyz/i.test(pwd)) score-=10;
      if(/123|234|345|456|567|678|789/.test(pwd)) score-=10;

      score=Math.max(0,Math.min(100,score));

      // Determine level
      let level,color;
      if(score<20){level='非常弱';color='#f87171';}
      else if(score<40){level='弱';color='#fb923c';}
      else if(score<60){level='一般';color='#fbbf24';}
      else if(score<80){level='强';color='#34d399';}
      else{level='非常强';color='#22d3ee';}

      bar.style.width=score+'%';
      bar.style.background=color;
      document.querySelector('.pstr-input').style.borderColor=score>=60?'rgba(52,211,153,0.5)':'rgba(251,113,133,0.5)';

      scoreEl.textContent=score;
      scoreEl.style.color=color;
      labelEl.textContent=level;
      labelEl.style.color=color;

      // Crack time estimation
      let entropy=0;
      if(/[a-z]/.test(pwd)) entropy+=26;
      if(/[A-Z]/.test(pwd)) entropy+=26;
      if(/[0-9]/.test(pwd)) entropy+=10;
      if(/[^a-zA-Z0-9]/.test(pwd)) entropy+=32;
      const bits=Math.log2(entropy)*len;
      const combos=Math.pow(entropy,len);
      const guessesPerSec=1e10; // 10 billion guesses/sec
      const seconds=combos/guessesPerSec;
      let timeStr;
      if(seconds<1) timeStr='不到 1 秒';
      else if(seconds<60) timeStr=Math.round(seconds)+' 秒';
      else if(seconds<3600) timeStr=Math.round(seconds/60)+' 分钟';
      else if(seconds<86400) timeStr=Math.round(seconds/3600)+' 小时';
      else if(seconds<31536000) timeStr=Math.round(seconds/86400)+' 天';
      else if(seconds<31536000*100) timeStr=Math.round(seconds/31536000)+' 年';
      else timeStr='100+ 年';
      timeEl.textContent='破解时间: '+timeStr;

      // Detail list
      const checks=[
        {label:'长度 ≥ 8 位',pass:len>=8},
        {label:'长度 ≥ 12 位',pass:len>=12},
        {label:'包含小写字母',pass:/[a-z]/.test(pwd)},
        {label:'包含大写字母',pass:/[A-Z]/.test(pwd)},
        {label:'包含数字',pass:/[0-9]/.test(pwd)},
        {label:'包含特殊字符',pass:/[^a-zA-Z0-9]/.test(pwd)},
        {label:'无常见密码模式',pass:!commons.some(c=>pwd.toLowerCase().includes(c))},
        {label:'无重复字符',pass:!/(.)\1{2,}/.test(pwd)},
      ];
      detailEl.innerHTML=checks.map(c=>
        `<div class="pstr-detail"><span class="d-crit">${c.label}</span><span class="${c.pass?'d-pass':'d-fail'}">${c.pass?'✓':'✗'}</span></div>`
      ).join('');

      // Suggestions
      const sugs=[];
      if(len<8) sugs.push('增加密码长度（至少8位，建议12位以上）');
      if(!/[a-z]/.test(pwd)) sugs.push('添加小写字母');
      if(!/[A-Z]/.test(pwd)) sugs.push('添加大写字母');
      if(!/[0-9]/.test(pwd)) sugs.push('添加数字');
      if(!/[^a-zA-Z0-9]/.test(pwd)) sugs.push('添加特殊字符（如 !@#$%^&*）');
      if(commons.some(c=>pwd.toLowerCase().includes(c))) sugs.push('避免使用常见的密码模式');
      if(/(.)\1{2,}/.test(pwd)) sugs.push('避免重复字符（如 "aaa"）');
      suggestEl.innerHTML=sugs.length?'💡 '+sugs.join('<br>💡 '):'✅ 密码强度良好，没有明显问题';
    }

    analyze();
  </script>
</body>
</html>
