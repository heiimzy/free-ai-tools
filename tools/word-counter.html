<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字数统计工具 - 在线文章字数统计 | Free AI Tools</title>
  <meta name="description" content="免费在线字数统计工具，实时统计文本字数、字符数、段落数、句子数，估算阅读时间。支持中英文混排统计。">
  <meta name="keywords" content="字数统计,在线字数统计,字符统计,文章字数,阅读时间计算">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="../index.html" class="logo">Free AI Tools <span>免费</span></a>
      <nav>
        <a href="../index.html">首页</a>
        <a href="../tools/text-rewriter.html">AI改写</a>
        <a href="../tools/password-generator.html">密码生成</a>
      </nav>
    </div>
  </header>

  <main class="tool-page container">
    <div class="tool-header">
      <h1>字数统计工具</h1>
      <p>实时统计文本的字数、字符数、段落数、句子数等详细数据。</p>
    </div>

    <div class="tool-container">
      <div class="form-group">
        <label for="inputText">输入文本</label>
        <textarea id="inputText" placeholder="在此粘贴或输入文本..." rows="8" oninput="updateStats()"></textarea>
      </div>

      <div class="stats-row" id="statsContainer">
        <div class="stat-box"><div class="value" id="wordCount">0</div><div class="label">字数</div></div>
        <div class="stat-box"><div class="value" id="charCount">0</div><div class="label">字符数</div></div>
        <div class="stat-box"><div class="value" id="charNoSpace">0</div><div class="label">字符数(不含空格)</div></div>
        <div class="stat-box"><div class="value" id="sentenceCount">0</div><div class="label">句子数</div></div>
        <div class="stat-box"><div class="value" id="paraCount">0</div><div class="label">段落数</div></div>
        <div class="stat-box"><div class="value" id="readTime">0</div><div class="label">阅读时间(分钟)</div></div>
      </div>

      <div style="display: flex; gap: 0.75rem;">
        <button class="btn btn-secondary" onclick="clearText()">清空</button>
        <button class="btn btn-success" onclick="copyStats()">📋 复制统计数据</button>
      </div>
    </div>

    <!-- AdSense 广告位 -->
    <div class="ad-placeholder">
      [广告位] Google AdSense - 将在获得批准后启用<br>
      <small>欢迎广告合作：请联系站长添加您的广告</small>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Free AI Tools &copy; 2026 - 免费在线工具集 | <a href="../index.html">首页</a></p>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function updateStats() {
      const text = document.getElementById('inputText').value;
      const trimmed = text.trim();

      // Word count (Chinese words = characters, English = words)
      const chineseChars = (trimmed.match(/[一-鿿㐀-䶿]/g) || []).length;
      const englishWords = trimmed.replace(/[一-鿿㐀-䶿]/g, ' ').split(/\s+/).filter(w => w.length > 0).length;
      const wordCount = chineseChars + englishWords;

      // Character counts
      const charCount = trimmed.length;
      const charNoSpace = trimmed.replace(/\s/g, '').length;

      // Sentences
      const sentenceCount = (trimmed.match(/[。！？.!?]+/g) || []).length || (trimmed.length > 0 ? 1 : 0);

      // Paragraphs
      const paraCount = trimmed.split(/\n\s*\n/).filter(p => p.trim().length > 0).length || (trimmed.length > 0 ? 1 : 0);

      // Read time (Chinese ~300 chars/min, English ~200 words/min)
      const readTime = Math.max(1, Math.ceil(charNoSpace / 300 + englishWords / 200));

      document.getElementById('wordCount').textContent = wordCount.toLocaleString();
      document.getElementById('charCount').textContent = charCount.toLocaleString();
      document.getElementById('charNoSpace').textContent = charNoSpace.toLocaleString();
      document.getElementById('sentenceCount').textContent = sentenceCount.toLocaleString();
      document.getElementById('paraCount').textContent = paraCount.toLocaleString();
      document.getElementById('readTime').textContent = readTime.toLocaleString();
    }

    function clearText() {
      document.getElementById('inputText').value = '';
      updateStats();
      showToast('已清空');
    }

    function copyStats() {
      const text = document.getElementById('inputText').value;
      if (!text.trim()) {
        showToast('没有数据可复制');
        return;
      }
      const stats = `字数: ${document.getElementById('wordCount').textContent}
字符数: ${document.getElementById('charCount').textContent}
字符数(不含空格): ${document.getElementById('charNoSpace').textContent}
句子数: ${document.getElementById('sentenceCount').textContent}
段落数: ${document.getElementById('paraCount').textContent}
阅读时间: ${document.getElementById('readTime').textContent} 分钟`;
      navigator.clipboard.writeText(stats).then(() => showToast('✅ 统计已复制'));
    }
  </script>
</body>
</html>
