<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线倒计时器 - 免费计时器/秒表 | Free AI Tools</title>
  <meta name="description" content="免费在线倒计时器，支持自定义时/分/秒，精确倒计时到零并发出通知提醒。包含秒表模式，适合烹饪计时、运动计时、工作间隔、番茄钟等场景。浏览器本地运行，无需安装。">
  <meta name="keywords" content="倒计时器,在线计时器,秒表,番茄钟,时间管理,定时器,倒计时,Countdown Timer">
  <link rel="stylesheet" href="../style.css">
  <style>
    .timer-layout { max-width: 500px; margin: 0 auto; display: grid; gap: 2rem; text-align: center; }
    .timer-display { font-size: 4.5rem; font-weight: 800; letter-spacing: 0.1em; background: linear-gradient(135deg, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.2; font-variant-numeric: tabular-nums; }
    .timer-inputs { display: flex; gap: 0.5rem; justify-content: center; align-items: center; }
    .timer-inputs input { width: 70px; padding: 0.5rem; text-align: center; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 1.5rem; font-weight: 700; font-family: inherit; }
    .timer-inputs input:focus { outline: none; border-color: var(--primary); }
    .timer-inputs span { font-size: 1.5rem; font-weight: 700; color: var(--text-muted); }
    .timer-inputs .label { font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 0.2rem; }
    .timer-btns { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .timer-btn { padding: 0.7rem 2rem; border: none; border-radius: 8px; font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; min-width: 100px; }
    .timer-btn-start { background: linear-gradient(135deg, var(--primary), #7c3aed); color: white; }
    .timer-btn-start:hover { transform: translateY(-2px); box-shadow: 0 4px 15px var(--glow-purple); }
    .timer-btn-pause { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
    .timer-btn-pause:hover { transform: translateY(-2px); }
    .timer-btn-reset { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); }
    .timer-btn-reset:hover { border-color: var(--danger); color: var(--danger); }
    .timer-status { font-size: 0.9rem; color: var(--text-muted); min-height: 1.5rem; }
    .timer-presets { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
    .timer-presets button { padding: 0.4rem 1rem; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; font-family: inherit; transition: 0.2s; }
    .timer-presets button:hover { border-color: var(--primary); color: var(--text); background: rgba(167,139,250,0.05); }
    .timer-ring { width: 200px; height: 200px; margin: 0 auto; position: relative; }
    .timer-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .timer-ring .bg { fill: none; stroke: var(--border); stroke-width: 6; }
    .timer-ring .progress { fill: none; stroke: url(#grad); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.3s; }
    @media (max-width: 480px) { .timer-display { font-size: 3rem; } .timer-inputs input { width: 55px; font-size: 1.2rem; } }
  </style>
  <link rel="canonical" href="https://heiimzy.github.io/free-ai-tools/tools/timer.html">
</head>
<body>
  <header>
    <div class="container">
      <a href="../index.html" class="logo">Free AI Tools <span>免费</span></a>
      <nav><a href="../index.html">首页</a><a href="../tools/timer.html">倒计时</a><a href="../tools/text-rewriter.html">AI改写</a></nav>
    </div>
  </header>

  <main class="tool-page container">
    <div class="tool-header">
      <h1>在线倒计时器 / Countdown Timer</h1>
      <p>自定义倒计时，支持暂停、继续、完成提醒。适合番茄钟、运动、烹饪等场景。</p>
    </div>

    <div class="tool-container">
      <div class="timer-layout">
        <div class="timer-presets">
          <button onclick="setPreset(1,0,0)">1分钟</button>
          <button onclick="setPreset(5,0,0)">5分钟</button>
          <button onclick="setPreset(15,0,0)">15分钟</button>
          <button onclick="setPreset(25,0,0)">25分钟</button>
          <button onclick="setPreset(30,0,0)">30分钟</button>
          <button onclick="setPreset(60,0,0)">60分钟</button>
        </div>

        <div class="timer-ring" id="timerRing">
          <svg viewBox="0 0 200 200">
            <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#f472b6"/></linearGradient></defs>
            <circle class="bg" cx="100" cy="100" r="88"/>
            <circle class="progress" id="progressRing" cx="100" cy="100" r="88" stroke-dasharray="553" stroke-dashoffset="0"/>
          </svg>
        </div>

        <div class="timer-display" id="timerDisplay">00:00</div>

        <div class="timer-inputs">
          <div><input type="number" id="inputHours" min="0" max="99" value="0"><span class="label">时</span></div>
          <span>:</span>
          <div><input type="number" id="inputMinutes" min="0" max="59" value="5"><span class="label">分</span></div>
          <span>:</span>
          <div><input type="number" id="inputSeconds" min="0" max="59" value="0"><span class="label">秒</span></div>
        </div>

        <div class="timer-btns">
          <button class="timer-btn timer-btn-start" id="btnStart" onclick="startTimer()">▶ 开始</button>
          <button class="timer-btn timer-btn-pause" id="btnPause" onclick="pauseTimer()" style="display:none;">⏸ 暂停</button>
          <button class="timer-btn timer-btn-reset" onclick="resetTimer()">↺ 重置</button>
        </div>

        <div class="timer-status" id="timerStatus">就绪 — 设置时间后点击"开始"</div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Free AI Tools &copy; 2026 - 免费在线工具集 | <a href="../index.html">首页</a></p>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    let totalSeconds = 0, remainingSeconds = 0, isRunning = false, isPaused = false, timerInterval = null;
    const CIRCUMFERENCE = 553;

    function setPreset(h, m, s) {
      if (isRunning) return;
      document.getElementById('inputHours').value = h;
      document.getElementById('inputMinutes').value = m;
      document.getElementById('inputSeconds').value = s;
      updateDisplay(h * 3600 + m * 60 + s);
      updateRing(100);
      document.getElementById('timerStatus').textContent = `预设 ${h}时${m}分${s}秒 — 点击"开始"`;
    }

    function startTimer() {
      if (isRunning && isPaused) {
        isPaused = false;
        document.getElementById('btnPause').textContent = '⏸ 暂停';
        document.getElementById('timerStatus').textContent = '运行中...';
        runInterval();
        return;
      }
      if (isRunning) return;

      const h = parseInt(document.getElementById('inputHours').value) || 0;
      const m = parseInt(document.getElementById('inputMinutes').value) || 0;
      const s = parseInt(document.getElementById('inputSeconds').value) || 0;
      totalSeconds = h * 3600 + m * 60 + s;
      if (totalSeconds <= 0) return;

      remainingSeconds = totalSeconds;
      isRunning = true; isPaused = false;
      document.getElementById('inputHours').disabled = true;
      document.getElementById('inputMinutes').disabled = true;
      document.getElementById('inputSeconds').disabled = true;
      document.getElementById('btnStart').style.display = 'none';
      document.getElementById('btnPause').style.display = 'inline-block';
      document.getElementById('btnPause').textContent = '⏸ 暂停';
      document.getElementById('timerStatus').textContent = '运行中...';

      updateDisplay(remainingSeconds);
      runInterval();
    }

    function runInterval() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (isPaused) return;
        remainingSeconds--;
        if (remainingSeconds <= 0) {
          clearInterval(timerInterval);
          timerInterval = null;
          isRunning = false;
          updateDisplay(0);
          updateRing(0);
          document.getElementById('timerStatus').textContent = '⏰ 时间到！';
          document.getElementById('btnStart').style.display = 'inline-block';
          document.getElementById('btnPause').style.display = 'none';
          document.getElementById('inputHours').disabled = false;
          document.getElementById('inputMinutes').disabled = false;
          document.getElementById('inputSeconds').disabled = false;
          // Notification
          if ('Notification' in window && Notification.permission === 'granted') {
            try { new Notification('⏰ 时间到！', { body: '倒计时已结束', icon: '../icon.svg' }); } catch(e) {}
          }
          playBeep();
          return;
        }
        updateDisplay(remainingSeconds);
        const pct = (remainingSeconds / totalSeconds) * 100;
        updateRing(pct);
      }, 1000);
    }

    function pauseTimer() {
      if (!isRunning) return;
      isPaused = !isPaused;
      document.getElementById('btnPause').textContent = isPaused ? '▶ 继续' : '⏸ 暂停';
      document.getElementById('timerStatus').textContent = isPaused ? '已暂停' : '运行中...';
    }

    function resetTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null; isRunning = false; isPaused = false;
      document.getElementById('inputHours').disabled = false;
      document.getElementById('inputMinutes').disabled = false;
      document.getElementById('inputSeconds').disabled = false;
      document.getElementById('btnStart').style.display = 'inline-block';
      document.getElementById('btnPause').style.display = 'none';
      const h = parseInt(document.getElementById('inputHours').value) || 0;
      const m = parseInt(document.getElementById('inputMinutes').value) || 0;
      const s = parseInt(document.getElementById('inputSeconds').value) || 0;
      updateDisplay(h * 3600 + m * 60 + s);
      updateRing(100);
      document.getElementById('timerStatus').textContent = '已重置';
    }

    function updateDisplay(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      document.getElementById('timerDisplay').textContent =
        `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function updateRing(pct) {
      const offset = CIRCUMFERENCE - (pct / 100) * CIRCUMFERENCE;
      document.getElementById('progressRing').style.strokeDashoffset = offset;
    }

    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.3;
        osc.start(); osc.stop(ctx.currentTime + 0.5);
        setTimeout(() => { const o2 = ctx.createOscillator(); const g2 = ctx.createGain(); o2.connect(g2); g2.connect(ctx.destination); o2.frequency.value = 880; g2.gain.value = 0.3; o2.start(); o2.stop(ctx.currentTime + 0.5); }, 600);
      } catch(e) {}
    }
  </script>
</body>
</html>
