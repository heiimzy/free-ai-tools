<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线颜色选择器 - 调色板生成 | Free AI Tools</title>
  <meta name="description" content="免费在线颜色选择器，支持取色器、HEX/RGB/HSL/HSL各种颜色格式互转、调色板生成、颜色预览，前端设计师必备工具。">
  <meta name="keywords" content="颜色选择器,在线取色器,调色板,颜色转换,HEX转RGB,前端工具">
  <link rel="stylesheet" href="../style.css">
  <style>
    .color-picker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    .color-preview-box { width: 100%; height: 120px; border-radius: 12px; border: 2px solid var(--border); cursor: pointer; transition: 0.2s; position: relative; display: flex; align-items: center; justify-content: center; }
    .color-preview-box:hover { transform: scale(1.02); }
    .color-preview-box input[type="color"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .color-hex-label { background: rgba(0,0,0,0.6); color: #fff; padding: 0.3rem 0.8rem; border-radius: 8px; font-size: 0.9rem; font-family: monospace; pointer-events: none; }
    .color-formats { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
    .color-formats .fmt-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
    .color-formats .fmt-row:last-child { border-bottom: none; }
    .color-formats .fmt-label { color: var(--text-muted); font-size: 0.85rem; }
    .color-formats .fmt-value { font-family: monospace; font-size: 0.9rem; cursor: pointer; color: var(--text); transition: 0.2s; }
    .color-formats .fmt-value:hover { color: var(--primary); }
    .palette-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 0.5rem; margin-top: 0.75rem; }
    .palette-swatch { height: 60px; border-radius: 8px; cursor: pointer; transition: 0.2s; position: relative; border: 2px solid transparent; }
    .palette-swatch:hover { transform: scale(1.1); border-color: var(--primary); }
    .palette-swatch .swatch-hex { position: absolute; bottom: 4px; left: 4px; right: 4px; font-size: 0.6rem; text-align: center; background: rgba(0,0,0,0.5); color: #fff; border-radius: 4px; padding: 1px 2px; font-family: monospace; opacity: 0; transition: 0.2s; }
    .palette-swatch:hover .swatch-hex { opacity: 1; }
    .history-grid { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .history-dot { width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
    .history-dot:hover { transform: scale(1.15); border-color: var(--primary); }
    .harmony-section { margin-top: 1.5rem; }
    @media (max-width: 768px) { .color-picker-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="../index.html" class="logo">Free AI Tools <span>免费</span></a>
      <nav><a href="../index.html">首页</a><a href="../tools/text-rewriter.html">AI改写</a><a href="../tools/color-picker.html">颜色工具</a></nav>
    </div>
  </header>

  <main class="tool-page container">
    <div class="tool-header">
      <h1>在线颜色选择器</h1>
      <p>颜色选取、格式互转、调色板生成，支持 HEX / RGB / HSL。</p>
    </div>

    <div class="tool-container">
      <div class="color-picker-grid">
        <div>
          <div class="color-preview-box" id="colorPreview">
            <input type="color" id="colorInput" value="#a78bfa" oninput="updateColor(this.value)">
            <span class="color-hex-label" id="hexLabel">#a78bfa</span>
          </div>
        </div>
        <div class="color-formats" id="colorFormats">
          <div class="fmt-row"><span class="fmt-label">HEX</span><span class="fmt-value" id="fmtHex" onclick="copyText(this)">#a78bfa</span></div>
          <div class="fmt-row"><span class="fmt-label">RGB</span><span class="fmt-value" id="fmtRgb" onclick="copyText(this)">rgb(167,139,250)</span></div>
          <div class="fmt-row"><span class="fmt-label">HSL</span><span class="fmt-value" id="fmtHsl" onclick="copyText(this)">hsl(256,92%,76%)</span></div>
        </div>
      </div>

      <div class="form-group">
        <label>自定义 HEX / RGB / HSL</label>
        <input type="text" id="customInput" placeholder="输入 #a78bfa 或 rgb(167,139,250) 或 hsl(256,92%,76%)" style="width:100%;padding:0.65rem 0.8rem;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-family:monospace;">
        <button class="btn btn-primary" onclick="applyCustom()" style="margin-top:0.5rem;">应用</button>
      </div>

      <div class="harmony-section">
        <label>配色方案</label>
        <div class="palette-grid" id="paletteGrid"></div>
      </div>

      <div class="harmony-section" style="margin-top:1.5rem;">
        <label>取色历史</label>
        <div class="history-grid" id="historyGrid"></div>
      </div>
    </div>

    <div class="ad-placeholder">[广告位] Google AdSense</div>
  </main>
  <footer><div class="container"><p>Free AI Tools &copy; 2026 | <a href="../index.html">首页</a></p></div></footer>
  <div class="toast" id="toast"></div>

  <script>
    function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
    function copyText(el){const v=el.textContent;navigator.clipboard.writeText(v).then(()=>showToast('已复制: '+v)).catch(()=>{const ta=document.createElement('textarea');ta.value=v;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('已复制: '+v);});}

    let colorHistory = JSON.parse(localStorage.getItem('fat_colorHistory') || '[]');

    function hexToRgb(hex){
      const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
      return {r,g,b};
    }

    function rgbToHsl(r,g,b){
      r/=255;g/=255;b/=255;
      const max=Math.max(r,g,b),min=Math.min(r,g,b);
      let h=0,s=0,l=(max+min)/2;
      if(max!==min){
        const d=max-min;
        s=l>0.5?d/(2-max-min):d/(max+min);
        switch(max){
          case r:h=((g-b)/d+(g<b?6:0))/6;break;
          case g:h=((b-r)/d+2)/6;break;
          case b:h=((r-g)/d+4)/6;break;
        }
      }
      return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
    }

    function hslToRgb(h,s,l){
      s/=100;l/=100;
      const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;
      let r=0,g=0,b=0;
      if(h<60){r=c;g=x;}
      else if(h<120){r=x;g=c;}
      else if(h<180){g=c;b=x;}
      else if(h<240){g=x;b=c;}
      else if(h<300){r=x;b=c;}
      else{r=c;b=x;}
      return {r:Math.round((r+m)*255),g:Math.round((g+m)*255),b:Math.round((b+m)*255)};
    }

    function rgbToHex(r,g,b){return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}

    function parseColor(str){
      str=str.trim();
      // #hex
      const hexM=str.match(/^#([0-9a-f]{6})$/i);
      if(hexM) return {hex:str.toLowerCase(),rgb:hexToRgb(str),type:'hex'};
      const hex3M=str.match(/^#([0-9a-f]{3})$/i);
      if(hex3M){const h=hex3M[1];const full='#'+h[0]+h[0]+h[1]+h[1]+h[2]+h[2];return {hex:full,rgb:hexToRgb(full),type:'hex'};}
      // rgb
      const rgbM=str.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/i);
      if(rgbM){const r=+rgbM[1],g=+rgbM[2],b=+rgbM[3];return {hex:rgbToHex(r,g,b),rgb:{r,g,b},type:'rgb'};}
      // hsl
      const hslM=str.match(/hsl\s*\(\s*(\d+)\s*,\s*(\d+)%\s*,\s*(\d+)%\s*\)/i);
      if(hslM){const h=+hslM[1],s=+hslM[2],l=+hslM[3];const rgb=hslToRgb(h,s,l);return {hex:rgbToHex(rgb.r,rgb.g,rgb.b),rgb,type:'hsl'};}
      return null;
    }

    function updateColor(hex){
      const rgb=hexToRgb(hex);
      const hsl=rgbToHsl(rgb.r,rgb.g,rgb.b);
      document.getElementById('colorPreview').style.background=hex;
      document.getElementById('hexLabel').textContent=hex;
      document.getElementById('fmtHex').textContent=hex;
      document.getElementById('fmtRgb').textContent=`rgb(${rgb.r},${rgb.g},${rgb.b})`;
      document.getElementById('fmtHsl').textContent=`hsl(${hsl.h},${hsl.s}%,${hsl.l}%)`;
      document.getElementById('colorInput').value=hex;
      generatePalette(hex);
      addHistory(hex);
    }

    function applyCustom(){
      const val=document.getElementById('customInput').value.trim();
      const parsed=parseColor(val);
      if(!parsed){showToast('无法识别颜色格式');return;}
      updateColor(parsed.hex);
    }

    function generatePalette(hex){
      const rgb=hexToRgb(hex);
      const hsl=rgbToHsl(rgb.r,rgb.g,rgb.b);
      const pal=[];
      // harmonious variations
      const variations = [
        {h:0,s:0,l:0,name:'base'},
        {h:0,s:-20,l:0,name:'less saturation'},
        {h:30,s:0,l:0,name:'analogous1'},
        {h:-30,s:0,l:0,name:'analogous2'},
        {h:180,s:0,l:0,name:'complementary'},
        {h:0,s:0,l:15,name:'lighter'},
        {h:0,s:0,l:-15,name:'darker'},
        {h:150,s:0,l:0,name:'triadic1'},
        {h:-150,s:0,l:0,name:'triadic2'},
      ];
      for(const v of variations){
        let h=(hsl.h+v.h+360)%360;
        let s=Math.max(0,Math.min(100,hsl.s+(v.s||0)));
        let l=Math.max(0,Math.min(100,hsl.l+(v.l||0)));
        const rgbC=hslToRgb(h,s,l);
        pal.push(rgbToHex(rgbC.r,rgbC.g,rgbC.b));
      }
      const grid=document.getElementById('paletteGrid');
      grid.innerHTML=pal.map(c=>`<div class="palette-swatch" style="background:${c}" onclick="copyTextFromSwatch('${c}')" title="${c}"><span class="swatch-hex">${c}</span></div>`).join('');
    }

    function copyTextFromSwatch(c){navigator.clipboard.writeText(c).then(()=>showToast('已复制: '+c)).catch(()=>{});}

    function addHistory(hex){
      colorHistory=colorHistory.filter(c=>c!==hex);
      colorHistory.unshift(hex);
      if(colorHistory.length>20) colorHistory=colorHistory.slice(0,20);
      localStorage.setItem('fat_colorHistory',JSON.stringify(colorHistory));
      renderHistory();
    }

    function renderHistory(){
      const grid=document.getElementById('historyGrid');
      grid.innerHTML=colorHistory.map(c=>`<div class="history-dot" style="background:${c}" onclick="updateColor('${c}')" title="${c}"></div>`).join('');
    }

    // init
    updateColor('#a78bfa');
    renderHistory();

    // Enter key for custom input
    document.getElementById('customInput').addEventListener('keydown',function(e){if(e.key==='Enter')applyCustom();});
  </script>
</body>
</html>
