  <script>
    function showToast(m,e){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');t.style.background=e?'var(--danger)':'var(--success)';setTimeout(()=>t.classList.remove('show'),2500);}

    function escapeHTML(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

    function renderMD(){
      let md = document.getElementById('mdInput').value;
      let html = md;

      // Escape HTML tags first
      html = escapeHTML(html);

      // Code blocks (fenced) - must be before inline code
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

      // Headers
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      // Horizontal rules
      html = html.replace(/^---$/gm, '<hr>');

      // Blockquotes
      html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

      // Tables
      html = html.replace(/\|(.+)\|/g, function(match) {
        if (match.includes('---')) return '<hr>';
        const cells = match.split('|').filter(c => c.trim());
        return '<tr><td>' + cells.map(c => c.trim()).join('</td><td>') + '</td></tr>';
      });

      // Unordered lists
      html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

      // Ordered lists
      html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

      // Images
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

      // Links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Bold + Italic
      html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');

      // Line breaks
      html = html.replace(/\n\n/g, '</p><p>');
      html = html.replace(/\n/g, '<br>');

      // Wrap in paragraph
      html = '<p>' + html + '</p>';

      // Clean up nested paragraphs from block elements
      html = html.replace(/<\/p><p><(h[1-3]|ul|ol|li|blockquote|pre|hr|table|tr|td|th)/g, '<$1');
      html = html.replace(/\/(h[1-3]|ul|ol|li|blockquote|pre|hr|table|tr|td|th)><\/p>/g, '/$1>');
      html = html.replace(/<\/p><p><\/p>/g, '');
      html = html.replace(/<p><\/p>/g, '');

      // Clean up nested lists
      html = html.replace(/<ul>\n?<li>/g, '<ul><li>');
      html = html.replace(/<\/li>\n?<\/ul>/g, '</li></ul>');

      document.getElementById('mdPreview').innerHTML = html;
    }

    function copyHTML(){
      const html = document.getElementById('mdPreview').innerHTML;
      if(html){navigator.clipboard.writeText(html).then(()=>showToast('✅ HTML已复制'));}
    }

    function resetMD(){document.getElementById('mdInput').value=document.getElementById('mdInput').placeholder;renderMD();}

    window.addEventListener('DOMContentLoaded', renderMD);
  </script>
