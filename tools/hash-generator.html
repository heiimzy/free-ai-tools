<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>哈希生成器 - 在线MD5/SHA1/SHA256/SHA512计算 | Free AI Tools</title>
  <meta name="description" content="免费在线哈希值计算工具，支持MD5、SHA-1、SHA-256、SHA-384、SHA-512多种算法，实时计算文本哈希值，一键复制结果，适合开发者和安全测试使用。">
  <meta name="keywords" content="哈希生成器,MD5在线计算,SHA256,SHA512加密,哈希计算器,Hash在线工具,消息摘要">
  <link rel="stylesheet" href="../style.css">
  <style>
    .hash-layout { display: grid; gap: 1.5rem; }
    .hash-textarea { width: 100%; min-height: 130px; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-family: monospace; font-size: 0.85rem; resize: vertical; box-sizing: border-box; line-height: 1.5; }
    .hash-textarea:focus { outline: none; border-color: var(--primary); }
    .hash-textarea::placeholder { color: var(--text-muted); opacity: 0.5; }
    .hash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .hash-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; cursor: pointer; transition: 0.15s; }
    .hash-card:hover { border-color: var(--primary); }
    .hash-card .h-name { color: var(--text-muted); font-size: 0.75rem; margin-bottom: 0.25rem; font-weight: 600; }
    .hash-card .h-val { font-family: monospace; font-size: 0.8rem; color: var(--secondary); word-break: break-all; line-height: 1.4; }
    .hash-card .h-bits { color: var(--text-muted); font-size: 0.7rem; margin-top: 0.2rem; }
    @media (max-width: 768px) { .hash-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="../index.html" class="logo">Free AI Tools <span>免费</span></a>
      <nav><a href="../index.html">首页</a><a href="../tools/hash-generator.html">哈希生成</a><a href="../tools/text-rewriter.html">AI改写</a></nav>
    </div>
  </header>

  <main class="tool-page container">
    <div class="tool-header">
      <h1>哈希生成器 / Hash Generator</h1>
      <p>实时计算文本的 MD5、SHA-1、SHA-256、SHA-384、SHA-512 哈希值。</p>
    </div>

    <div class="tool-container">
      <div class="hash-layout">
        <div>
          <label>输入文本</label>
          <textarea class="hash-textarea" id="inputText" placeholder="输入要计算哈希的文本..." oninput="compute()">Hello, World!</textarea>
        </div>

        <div class="hash-grid" id="hashGrid"></div>

        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;">
          <span style="color:var(--text-muted);font-size:0.8rem;">点击卡片复制哈希值</span>
          <input type="checkbox" id="upperCase" onchange="compute()" style="accent-color:var(--primary);">
          <label for="upperCase" style="color:var(--text-muted);font-size:0.8rem;cursor:pointer;">大写输出</label>
        </div>
      </div>
    </div>

    <div class="ad-placeholder">[广告位] Google AdSense</div>
  </main>
  <footer><div class="container"><p>Free AI Tools &copy; 2026 | <a href="../index.html">首页</a></p></div></footer>
  <div class="toast" id="toast"></div>

  <script>
    function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

    async function compute(){
      const input=document.getElementById('inputText').value;
      const grid=document.getElementById('hashGrid');
      const upper=document.getElementById('upperCase').checked;

      if(!input.trim()){
        grid.innerHTML='<div style="color:var(--text-muted);grid-column:1/-1;padding:1rem;">输入文本开始计算</div>';
        return;
      }

      const enc=new TextEncoder();
      const buf=enc.encode(input);
      const h=async function(alg){
        const a=await crypto.subtle.digest(alg,buf);
        const b=new Uint8Array(a);
        let r='';
        for(let i=0;i<b.length;i++) r+=b[i].toString(16).padStart(2,'0');
        return upper?r.toUpperCase():r;
      };

      const maps=[
        {name:'MD5',fn:()=>'MD5 API 降级到手动实现',bits:128},
        {name:'SHA-1',fn:()=>h('SHA-1'),bits:160},
        {name:'SHA-256',fn:()=>h('SHA-256'),bits:256},
        {name:'SHA-384',fn:()=>h('SHA-384'),bits:384},
        {name:'SHA-512',fn:()=>h('SHA-512'),bits:512},
      ];

      // MD5 not available in SubtleCrypto, implement manually
      async function md5(s){
        const m=[]; const b=[];
        for(let i=0;i<s.length;i++) b.push(s.charCodeAt(i));
        const l=b.length*8;
        // Append padding
        b.push(0x80);
        while(b.length%64!==56) b.push(0);
        for(let i=0;i<8;i++) b.push((l>>>i*8)&0xFF);

        const k=[0xd76aa478,0xe8c7b756,0x242070db,0xc1bdceee,0xf57c0faf,0x4787c62a,0xa8304613,0xfd469501,0x698098d8,0x8b44f7af,0xffff5bb1,0x895cd7be,0x6b901122,0xfd987193,0xa679438e,0x49b40821,0xf61e2562,0xc040b340,0x265e5a51,0xe9b6c7aa,0xd62f105d,0x02441453,0xd8a1e681,0xe7d3fbc8,0x21e1cde6,0xc33707d6,0xf4d50d87,0x455a14ed,0xa9e3e905,0xfcefa3f8,0x676f02d9,0x8d2a4c8a,0xfffa3942,0x8771f681,0x6d9d6122,0xfde5380c,0xa4beea44,0x4bdecfa9,0xf6bb4b60,0xbebfbc70,0x289b7ec6,0xeaa127fa,0xd4ef3085,0x04881d05,0xd9d4d039,0xe6db99e5,0x1fa27cf8,0xc4ac5665,0xf4292244,0x432aff97,0xab9423a7,0xfc93a039,0x655b59c3,0x8f0ccc92,0xffeff47d,0x85845dd1,0x6fa87e4f,0xfe2ce6e0,0xa3014314,0x4e0811a1,0xf7537e82,0xbd3af235,0x2ad7d2bb,0xeb86d391];
        const s=[7,12,17,22,7,12,17,22,7,12,17,22,7,12,17,22,5,9,14,20,5,9,14,20,5,9,14,20,5,9,14,20,4,11,16,23,4,11,16,23,4,11,16,23,4,11,16,23,6,10,15,21,6,10,15,21,6,10,15,21,6,10,15,21];

        let a0=0x67452301,b0=0xefcdab89,c0=0x98badcfe,d0=0x10325476;

        for(let i=0;i<b.length;i+=64){
          let a=a0,b=b0,c=c0,d=d0;
          const w=[];
          for(let j=0;j<64;j++) w.push(b[i+j]|(b[i+j+1]<<8)|(b[i+j+2]<<16)|(b[i+j+3]<<24));
          for(let j=0;j<64;j++){
            let f,g;
            if(j<16){f=(b&c)|(~b&d);g=j;}
            else if(j<32){f=(d&b)|(~d&c);g=(5*j+1)%16;}
            else if(j<48){f=b^c^d;g=(3*j+5)%16;}
            else{f=c^(b|~d);g=(7*j)%16;}
            f=(f+a+k[j]+w[g])>>>0;
            a=d;d=c;c=b;b=(b+((f<<s[j])|(f>>>(32-s[j]))))>>>0;
          }
          a0=(a0+a)>>>0;b0=(b0+b)>>>0;c0=(c0+c)>>>0;d0=(d0+d)>>>0;
        }

        function toHex(n){return ('00000000'+(n>>>0).toString(16)).slice(-8);}
        let r=toHex(a0)+toHex(b0)+toHex(c0)+toHex(d0);
        return upper?r.toUpperCase():r;
      }

      const results=[
        {name:'MD5',val:await md5(input),bits:128},
        {name:'SHA-1',val:await h('SHA-1'),bits:160},
        {name:'SHA-256',val:await h('SHA-256'),bits:256},
        {name:'SHA-384',val:await h('SHA-384'),bits:384},
        {name:'SHA-512',val:await h('SHA-512'),bits:512},
      ];

      grid.innerHTML=results.map(r=>{
        const escaped=r.val.replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return `<div class="hash-card" onclick="copyHash('${r.val.replace(/'/g,"\\'")}')" title="点击复制">
          <div class="h-name">${r.name} <span class="h-bits">(${r.bits}-bit)</span></div>
          <div class="h-val">${escaped}</div>
        </div>`;
      }).join('');
    }

    function copyHash(v){
      navigator.clipboard.writeText(v).then(()=>showToast('已复制: '+v.slice(0,20)+'...')).catch(()=>{});
    }

    compute();
  </script>
</body>
</html>
