  <main class="tool-page container">
    <div class="tool-header">
      <h1>AES 加密解密 / AES Encrypt & Decrypt</h1>
      <p>使用 AES-256-GCM 在浏览器本地加密和解密文本数据。密钥和数据均不上传服务器。</p>
    </div>

    <div class="tool-container">
      <div class="aes-layout">
        <div class="aes-field">
          <label>密码短语 (Passphrase)</label>
          <input class="aes-input" type="text" id="passphrase" value="MySecretKey123!" placeholder="输入加密密码短语...">
        </div>

        <div class="aes-field">
          <label>输入内容</label>
          <textarea class="aes-textarea" id="inputText" placeholder="输入要加密的文本，或粘贴要解密的密文..."></textarea>
        </div>

        <div class="aes-row">
          <button class="aes-btn aes-btn-encrypt" onclick="doEncrypt()">🔒 加密</button>
          <button class="aes-btn aes-btn-decrypt" onclick="doDecrypt()">🔓 解密</button>
          <button class="aes-btn aes-btn-clear" onclick="clearAll()">清除</button>
        </div>

        <div class="aes-error" id="errorMsg"></div>

        <div class="aes-field">
          <label>输出结果 <span style="font-weight:400;color:var(--text-muted);font-size:0.75rem;">（点击复制）</span></label>
          <textarea class="aes-textarea" id="outputText" readonly placeholder="结果将显示在这里..." onclick="copyResult()" style="cursor:pointer;"></textarea>
        </div>

        <div class="aes-info">
          <strong>🔒 隐私安全</strong>：所有加密解密操作在浏览器本地完成，使用 Web Crypto API 的 AES-256-GCM 算法。密钥和数据不会离开你的设备。<br>
          <strong>📋 格式</strong>：加密结果以 Base64 格式输出（包含初始化向量），解密时需使用相同的密码短语。
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">

    </div>
  </footer>

  <script>
    async function deriveKey(passphrase, salt) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey({ name: 'PBKDF2', salt: salt, iterations: 600000, hash: 'SHA-256' },
        keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    async function doEncrypt() {
      const pass = document.getElementById('passphrase').value.trim();
      const text = document.getElementById('inputText').value;
      if (!pass) return showError('请输入密码短语');
      if (!text) return showError('请输入要加密的文本');
      try {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(pass, salt);
        const enc = new TextEncoder();
        const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(text));
        const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
        combined.set(salt, 0); combined.set(iv, salt.length);
        combined.set(new Uint8Array(encrypted), salt.length + iv.length);
        document.getElementById('outputText').value = btoa(String.fromCharCode(...combined));
      } catch(e) { showError('加密失败: ' + e.message); }
    }

    async function doDecrypt() {
      const pass = document.getElementById('passphrase').value.trim();
      const data = document.getElementById('inputText').value.trim();
      if (!pass) return showError('请输入密码短语');
      if (!data) return showError('请输入要解密的密文');
      try {
        const raw = Uint8Array.from(atob(data), c => c.charCodeAt(0));
        const salt = raw.slice(0, 16); const iv = raw.slice(16, 28);
        const encrypted = raw.slice(28);
        const key = await deriveKey(pass, salt);
        const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, encrypted);
        document.getElementById('outputText').value = new TextDecoder().decode(decrypted);
      } catch(e) { showError('解密失败: 密码短语错误或数据已损坏'); }
    }

    function clearAll() {
      document.getElementById('passphrase').value = 'MySecretKey123!';
      document.getElementById('inputText').value = '';
      document.getElementById('outputText').value = '';
      document.getElementById('errorMsg').style.display = 'none';
    }

    async function copyResult() {
      const el = document.getElementById('outputText');
      if (!el.value) return;
      try {
        await navigator.clipboard.writeText(el.value);
        showToast('已复制到剪贴板');
      } catch(e) { showToast('复制失败'); }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      if (!t) {
        const d = document.createElement('div');
        d.id = 'toast'; d.className = 'toast show';
        d.textContent = msg; document.body.appendChild(d);
        setTimeout(() => d.remove(), 2000);
      } else { t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
    }
  </script>
