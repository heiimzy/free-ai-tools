<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机数/随机工具 - 在线随机数生成器/抽奖/列表打乱 | Free AI Tools</title>
  <meta name="description" content="免费在线随机工具合集：随机数生成器（自定义范围）、抽奖转盘、列表随机排序、抛硬币、选颜色、随机密码生成。适合抽奖、开发测试、日常决策使用。">
  <meta name="keywords" content="随机数生成,在线抽奖,列表打乱,随机工具,抛硬币,随机密码,抽奖转盘">
  <link rel="stylesheet" href="../style.css">
  <style>
    .rand-layout { display: grid; gap: 1.5rem; }
    .rand-tabs { display: flex; gap: 0.25rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .rand-tab { padding: 0.45rem 1rem; border-radius: 8px 8px 0 0; border: 1px solid var(--border); border-bottom: none; background: var(--bg-card); color: var(--text-muted); cursor: pointer; font-size: 0.85rem; transition: 0.15s; }
    .rand-tab.active { color: var(--primary); border-color: var(--primary); background: rgba(167,139,250,0.05); }
    .rand-tab:hover { color: var(--primary); }
    .rand-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 0 8px 8px 8px; padding: 1.25rem; display: none; }
    .rand-panel.active { display: block; }
    .rand-panel label { display: block; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 0.3rem; }
    .rand-panel input[type="number"], .rand-panel textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.85rem; width: 100%; box-sizing: border-box; }
    .rand-panel input[type="number"]:focus, .rand-panel textarea:focus { outline: none; border-color: var(--primary); }
    .rand-panel textarea { min-height: 100px; font-family: monospace; resize: vertical; }
    .rand-panel .rand-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.75rem; }
    .rand-result { font-family: monospace; font-size: 2rem; color: var(--secondary); padding: 1rem; text-align: center; background: var(--bg); border-radius: 8px; margin-top: 0.75rem; word-break: break-all; }
    .rand-result.small { font-size: 1rem; }
    .rand-result .sub { font-size: 0.8rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="../index.html" class="logo">Free AI Tools <span>免费</span></a>
      <nav><a href="../index.html">首页</a><a href="../tools/random-generator.html">随机工具</a><a href="../tools/text-rewriter.html">AI改写</a></nav>
    </div>
  </header>

  <main class="tool-page container">
    <div class="tool-header">
      <h1>随机工具合集 / Random Tools</h1>
      <p>随机数生成、列表打乱、抛硬币、抽奖工具，全部在浏览器本地运行。</p>
    </div>

    <div class="tool-container">
      <div class="rand-layout">
        <div class="rand-tabs" id="tabs">
          <div class="rand-tab active" data-tab="number">随机数</div>
          <div class="rand-tab" data-tab="shuffle">列表打乱</div>
          <div class="rand-tab" data-tab="coin">抛硬币</div>
          <div class="rand-tab" data-tab="dice">掷骰子</div>
          <div class="rand-tab" data-tab="picker">抽奖器</div>
        </div>

        <!-- Random Number -->
        <div class="rand-panel active" id="panel-number">
          <label>最小值</label>
          <input type="number" id="numMin" value="1">
          <label style="margin-top:0.5rem;">最大值</label>
          <input type="number" id="numMax" value="100">
          <label style="margin-top:0.5rem;">生成数量</label>
          <input type="number" id="numCount" value="1" min="1" max="1000">
          <div class="rand-actions">
            <button class="btn btn-primary" onclick="genNumber()">生成</button>
            <label style="display:flex;align-items:center;gap:0.3rem;color:var(--text-muted);font-size:0.8rem;cursor:pointer;">
              <input type="checkbox" id="noRepeat" checked> 不重复
            </label>
          </div>
          <div class="rand-result" id="numResult">
            <span class="sub">点击"生成"获得随机数</span>
          </div>
        </div>

        <!-- Shuffle -->
        <div class="rand-panel" id="panel-shuffle">
          <label>输入列表（每行一项）</label>
          <textarea id="shuffleInput" placeholder="苹果&#10;香蕉&#10;橘子&#10;西瓜&#10;葡萄">苹果
香蕉
橘子
西瓜
葡萄</textarea>
          <div class="rand-actions">
            <button class="btn btn-primary" onclick="genShuffle()">打乱排序</button>
          </div>
          <div class="rand-result small" id="shuffleResult">
            <span class="sub">输入列表项并点击"打乱排序"</span>
          </div>
        </div>

        <!-- Coin Flip -->
        <div class="rand-panel" id="panel-coin">
          <div style="text-align:center;padding:1rem;">
            <div style="font-size:5rem;margin-bottom:0.5rem;" id="coinDisplay">🪙</div>
            <div style="font-size:1.5rem;color:var(--secondary);margin-bottom:0.5rem;" id="coinResult">点击抛硬币</div>
            <div style="color:var(--text-muted);font-size:0.85rem;" id="coinStats">正面: 0 | 反面: 0</div>
          </div>
          <div class="rand-actions" style="justify-content:center;">
            <button class="btn btn-primary" onclick="flipCoin()">🪙 抛硬币</button>
            <button class="btn btn-secondary" onclick="resetCoin()">重置</button>
          </div>
        </div>

        <!-- Dice -->
        <div class="rand-panel" id="panel-dice">
          <div style="text-align:center;padding:1rem;">
            <div style="font-size:4rem;margin-bottom:0.5rem;" id="diceDisplay">🎲</div>
            <div style="font-size:1.5rem;color:var(--secondary);margin-bottom:0.5rem;" id="diceResult">点击掷骰子</div>
          </div>
          <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;">
            <div><label>骰子面数</label><input type="number" id="diceSides" value="6" min="2" max="100" style="width:80px;"></div>
            <div><label>数量</label><input type="number" id="diceCount" value="1" min="1" max="20" style="width:80px;"></div>
          </div>
          <div class="rand-actions" style="justify-content:center;margin-top:1rem;">
            <button class="btn btn-primary" onclick="rollDice()">🎲 掷骰子</button>
          </div>
        </div>

        <!-- Picker -->
        <div class="rand-panel" id="panel-picker">
          <label>选项列表（每行一项）</label>
          <textarea id="pickerInput" placeholder="选项1&#10;选项2&#10;选项3">选项 A
选项 B
选项 C
选项 D</textarea>
          <label style="margin-top:0.5rem;">抽取数量</label>
          <input type="number" id="pickerCount" value="1" min="1" max="100">
          <div class="rand-actions">
            <button class="btn btn-primary" onclick="genPicker()">🎯 随机抽取</button>
          </div>
          <div class="rand-result" id="pickerResult">
            <span class="sub">输入选项并点击"随机抽取"</span>
          </div>
        </div>
      </div>
    </div>

    <div class="ad-placeholder">[广告位] Google AdSense</div>
  </main>
  <footer><div class="container"><p>Free AI Tools &copy; 2026 | <a href="../index.html">首页</a></p></div></footer>
  <div class="toast" id="toast"></div>

  <script>
    function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

    // Tab switching
    document.querySelectorAll('.rand-tab').forEach(tab=>{
      tab.addEventListener('click',function(){
        document.querySelectorAll('.rand-tab').forEach(t=>t.classList.remove('active'));
        document.querySelectorAll('.rand-panel').forEach(p=>p.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('panel-'+this.dataset.tab).classList.add('active');
      });
    });

    // Number
    function genNumber(){
      const min=parseInt(document.getElementById('numMin').value)||0;
      const max=parseInt(document.getElementById('numMax').value)||100;
      const count=Math.min(parseInt(document.getElementById('numCount').value)||1,1000);
      const noRepeat=document.getElementById('noRepeat').checked;

      if(min>max){showToast('最小值不能大于最大值');return;}
      const range=max-min+1;
      if(noRepeat && count>range){showToast(`不重复模式下最多生成 ${range} 个数字`);return;}

      let nums;
      if(noRepeat){
        const pool=Array.from({length:range},(_,i)=>i+min);
        for(let i=pool.length-1;i>0;i--){
          const j=Math.floor(Math.random()*(i+1));
          [pool[i],pool[j]]=[pool[j],pool[i]];
        }
        nums=pool.slice(0,count).sort((a,b)=>a-b);
      }else{
        nums=Array.from({length:count},()=>Math.floor(Math.random()*range)+min);
      }

      document.getElementById('numResult').textContent=nums.join(', ');
    }

    // Shuffle
    function genShuffle(){
      const input=document.getElementById('shuffleInput').value;
      const items=input.split('\n').filter(Boolean);
      if(items.length<2){showToast('至少输入2项');return;}
      for(let i=items.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [items[i],items[j]]=[items[j],items[i]];
      }
      document.getElementById('shuffleResult').innerHTML=items.map((v,i)=>`${i+1}. ${v}`).join('<br>');
      showToast('已打乱排序');
    }

    // Coin
    let heads=0,tails=0;
    function flipCoin(){
      const isHeads=Math.random()<0.5;
      if(isHeads)heads++;else tails++;
      document.getElementById('coinDisplay').textContent=isHeads?'🪙':'🪙';
      document.getElementById('coinResult').textContent=isHeads?'正面 (Heads)':'反面 (Tails)';
      document.getElementById('coinResult').style.color=isHeads?'var(--primary)':'var(--secondary)';
      document.getElementById('coinStats').textContent=`正面: ${heads} | 反面: ${tails}`;
    }
    function resetCoin(){heads=0;tails=0;document.getElementById('coinResult').textContent='点击抛硬币';document.getElementById('coinStats').textContent='正面: 0 | 反面: 0';}

    // Dice
    function rollDice(){
      const sides=parseInt(document.getElementById('diceSides').value)||6;
      const count=Math.min(parseInt(document.getElementById('diceCount').value)||1,20);
      const results=[];
      for(let i=0;i<count;i++) results.push(Math.floor(Math.random()*sides)+1);
      const total=results.reduce((a,b)=>a+b,0);
      document.getElementById('diceResult').innerHTML=results.join(' · ')+'<br><span class="sub">总和: '+total+'</span>';
      // Animate die
      const faces=['⚀','⚁','⚂','⚃','⚄','⚅'];
      document.getElementById('diceDisplay').textContent=sides<=6?faces[results[0]-1]||'🎲':'🎲';
    }

    // Picker
    function genPicker(){
      const input=document.getElementById('pickerInput').value;
      const items=input.split('\n').filter(Boolean);
      const count=Math.min(parseInt(document.getElementById('pickerCount').value)||1,items.length);
      if(items.length<1){showToast('请至少输入1个选项');return;}
      if(count>items.length){showToast(`最多抽取 ${items.length} 项`);return;}
      const pool=[...items];
      const picked=[];
      for(let i=0;i<count;i++){
        const idx=Math.floor(Math.random()*pool.length);
        picked.push(pool.splice(idx,1)[0]);
      }
      document.getElementById('pickerResult').innerHTML=picked.map(v=>`🎯 ${v}`).join('<br>');
      showToast(`抽取了 ${count} 项`);
    }

    // Enter key support for number fields
    document.querySelectorAll('#panel-number input[type="number"]').forEach(el=>{
      el.addEventListener('keydown',e=>{if(e.key==='Enter')genNumber();});
    });
  </script>
</body>
</html>
