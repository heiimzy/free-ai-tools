<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <meta name="keywords" content="时区转换,世界时钟,时差计算,UTC转换,北京时间,纽约时间,伦敦时间,东京时间,在线工具">
  <link rel="canonical" href="https://heiimzy.github.io/free-ai-tools/tools/timezone-converter.html">

  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .world-clocks { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .clock-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; text-align: center; transition: all 0.3s; }
    .clock-card:hover { border-color: var(--primary); box-shadow: 0 0 20px var(--glow-purple); }
    .clock-card .city { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.3rem; }
    .clock-card .time { font-size: 1.5rem; font-weight: 700; color: var(--primary); font-family: 'Courier New', monospace; }
    .clock-card .date { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }
    .clock-card .offset { font-size: 0.7rem; color: var(--secondary); }
    .convert-section { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: center; margin-bottom: 1.5rem; }
    .convert-section select, .convert-section input { width: 100%; }
    .swap-btn { background: none; border: 1px solid var(--border); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--primary); font-size: 1.2rem; transition: all 0.2s; }
    .swap-btn:hover { background: var(--bg-card); border-color: var(--primary); transform: rotate(180deg); }
    .tz-group { max-height: 300px; overflow-y: auto; }
    .tz-group::-webkit-scrollbar { width: 4px; }
    .tz-group::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 2px; }
    .meeting-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.5rem; margin-top: 1rem; }
    .meeting-slot { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem; text-align: center; cursor: pointer; transition: all 0.2s; font-size: 0.8rem; }
    .meeting-slot:hover { border-color: var(--primary); }
    .meeting-slot.good { background: linear-gradient(135deg, rgba(52,211,153,0.15), rgba(52,211,153,0.05)); border-color: var(--success); }
    .meeting-slot.ok { background: linear-gradient(135deg, rgba(251,191,36,0.15), rgba(251,191,36,0.05)); border-color: var(--warning); }
    .meeting-slot.bad { background: linear-gradient(135deg, rgba(251,113,133,0.1), rgba(251,113,133,0.05)); border-color: rgba(251,113,133,0.3); }
    .meeting-slot .slot-time { font-weight: 600; color: var(--text); }
    .meeting-slot .slot-label { font-size: 0.7rem; color: var(--text-muted); }
    @media (max-width: 768px) {
      .convert-section { grid-template-columns: 1fr; }
      .swap-btn { transform: rotate(90deg); }
      .swap-btn:hover { transform: rotate(270deg); }
      .world-clocks { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="../index.html" class="logo">Free AI Tools <span>免费</span></a>
      <nav><a href="../index.html">首页</a><a href="../blog/">AI博客</a></nav>
    </div>
  </header>
  <div class="tool-page">
    <div class="container">
      <div class="tool-header">
        <h1>世界时钟 · 时区转换</h1>
        <p>全球主要城市实时时钟、时区转换与会议时间规划</p>
      </div>
      <div class="tool-container">
        <h2 style="font-size:1rem;margin-bottom:1rem;color:var(--primary);">🌍 世界时钟</h2>
        <div class="world-clocks" id="worldClocks"></div>

        <h2 style="font-size:1rem;margin-bottom:1rem;color:var(--primary);">🔄 时区转换</h2>
        <div class="convert-section">
          <div>
            <label style="display:block;font-size:0.85rem;margin-bottom:0.3rem;color:var(--text-muted);">时间</label>
            <input type="datetime-local" id="fromTime">
          </div>
          <div></div>
          <div>
            <label style="display:block;font-size:0.85rem;margin-bottom:0.3rem;color:var(--text-muted);">源时区</label>
            <select id="fromTz" class="tz-group"></select>
          </div>
          <button class="swap-btn" onclick="swapTz()" title="交换时区">⇄</button>
          <div>
            <label style="display:block;font-size:0.85rem;margin-bottom:0.3rem;color:var(--text-muted);">目标时区</label>
            <select id="toTz" class="tz-group"></select>
          </div>
        </div>
        <button class="btn btn-primary" onclick="convertTz()">转换时间</button>
        <div class="result-area" id="tzResult" style="margin-top:1rem;min-height:auto;">
          <div class="label-small" id="tzResultLabel">选择时间和时区后点击转换</div>
        </div>

        <h2 style="font-size:1rem;margin:2rem 0 1rem;color:var(--primary);">🤝 会议时间规划</h2>
        <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.75rem;">选择您的时区和参会者时区，查看所有时区均合适的会议时间</p>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;">
          <select id="meetingTz1" style="flex:1;min-width:150px;"></select>
          <select id="meetingTz2" style="flex:1;min-width:150px;"></select>
          <select id="meetingTz3" style="flex:1;min-width:150px;"></select>
        </div>
        <button class="btn btn-secondary" onclick="findMeetingTimes()">查找最佳会议时间</button>
        <div class="meeting-grid" id="meetingGrid" style="margin-top:1rem;"></div>

        <!-- Search -->
        <div style="margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border);">
          <div class="form-group">
            <label>🔍 搜索城市时区</label>
            <input type="text" id="tzSearch" placeholder="输入城市名称，如 Beijing、New York、London..." oninput="searchTz()">
          </div>
          <div id="tzSearchResult"></div>
        </div>
      </div>
    </div>
  </div>
  <footer>
    <div class="container">
      <p>Free AI Tools &copy; 2026 - 免费在线工具集 | <a href="../index.html">首页</a></p>
    </div>
  </footer>
  <div class="toast" id="toast"></div>
  <script>
    const CITIES = [
      { name: '北京', tz: 'Asia/Shanghai', country: '中国' },
      { name: '东京', tz: 'Asia/Tokyo', country: '日本' },
      { name: '首尔', tz: 'Asia/Seoul', country: '韩国' },
      { name: '新加坡', tz: 'Asia/Singapore', country: '新加坡' },
      { name: '香港', tz: 'Asia/Hong_Kong', country: '中国' },
      { name: '迪拜', tz: 'Asia/Dubai', country: '阿联酋' },
      { name: '孟买', tz: 'Asia/Kolkata', country: '印度' },
      { name: '伦敦', tz: 'Europe/London', country: '英国' },
      { name: '柏林', tz: 'Europe/Berlin', country: '德国' },
      { name: '巴黎', tz: 'Europe/Paris', country: '法国' },
      { name: '莫斯科', tz: 'Europe/Moscow', country: '俄罗斯' },
      { name: '纽约', tz: 'America/New_York', country: '美国' },
      { name: '芝加哥', tz: 'America/Chicago', country: '美国' },
      { name: '丹佛', tz: 'America/Denver', country: '美国' },
      { name: '洛杉矶', tz: 'America/Los_Angeles', country: '美国' },
      { name: '悉尼', tz: 'Australia/Sydney', country: '澳大利亚' },
      { name: '奥克兰', tz: 'Pacific/Auckland', country: '新西兰' },
      { name: 'UTC', tz: 'UTC', country: '' },
    ];

    const TIMEZONES = Intl.supportedValuesOf ? Intl.supportedValuesOf('timeZone') : CITIES.map(c => c.tz);

    function fmtTime(date, tz) {
      return date.toLocaleString('zh-CN', { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    }

    function fmtDate(date, tz) {
      return date.toLocaleString('zh-CN', { timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit' });
    }

    function getOffset(tz) {
      const d = new Date();
      const s = d.toLocaleString('zh-CN', { timeZone: tz, timeZoneName: 'short' });
      const m = s.match(/([+-]\d{1,2}):?\d{2}/);
      return m ? m[1] + ':00' : 'UTC';
    }

    function renderClocks() {
      const el = document.getElementById('worldClocks');
      const now = new Date();
      el.innerHTML = CITIES.map(function(c) {
        const t = fmtTime(now, c.tz);
        const d = fmtDate(now, c.tz);
        const off = getOffset(c.tz);
        return '<div class="clock-card">' +
          '<div class="city">' + c.name + (c.country ? ' · ' + c.country : '') + '</div>' +
          '<div class="time">' + t + '</div>' +
          '<div class="date">' + d + '</div>' +
          '<div class="offset">UTC' + off + '</div>' +
          '</div>';
      }).join('');
    }

    function initSelects() {
      const selects = ['fromTz', 'toTz', 'meetingTz1', 'meetingTz2', 'meetingTz3'];
      const allTz = Intl.supportedValuesOf ? Intl.supportedValuesOf('timeZone') : CITIES.map(c => c.tz);
      const tzOptions = allTz.map(function(t) {
        var off = getOffset(t);
        return '<option value="' + t + '">(UTC' + off + ') ' + t.replace(/_/g, ' ') + '</option>';
      }).join('');

      selects.forEach(function(id) {
        document.getElementById(id).innerHTML = tzOptions;
      });

      // set defaults
      document.getElementById('fromTz').value = 'Asia/Shanghai';
      document.getElementById('toTz').value = 'America/New_York';
      document.getElementById('meetingTz1').value = 'Asia/Shanghai';
      document.getElementById('meetingTz2').value = 'America/New_York';
      document.getElementById('meetingTz3').value = 'Europe/London';

      // default time = now
      var now = new Date();
      var y = now.getFullYear();
      var m = String(now.getMonth() + 1).padStart(2, '0');
      var d = String(now.getDate()).padStart(2, '0');
      var h = String(now.getHours()).padStart(2, '0');
      var min = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('fromTime').value = y + '-' + m + '-' + d + 'T' + h + ':' + min;
    }

    function convertTz() {
      var fromVal = document.getElementById('fromTime').value;
      var fromTz = document.getElementById('fromTz').value;
      var toTz = document.getElementById('toTz').value;
      var outEl = document.getElementById('tzResult');
      var labelEl = document.getElementById('tzResultLabel');

      if (!fromVal) { labelEl.textContent = '请选择源时间'; outEl.querySelector('.big-text') && outEl.querySelector('.big-text').remove(); return; }

      var d = new Date(fromVal);
      if (isNaN(d.getTime())) { labelEl.textContent = '无效时间'; return; }

      var fromTime = d.toLocaleString('zh-CN', { timeZone: fromTz, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
      var toTime = d.toLocaleString('zh-CN', { timeZone: toTz, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
      var fromOff = getOffset(fromTz);
      var toOff = getOffset(toTz);

      labelEl.innerHTML = '<span style="color:var(--text-muted);font-size:0.8rem;">' + fromTz.replace(/_/g, ' ') + ' (UTC' + fromOff + ')</span> → <span style="color:var(--text-muted);font-size:0.8rem;">' + toTz.replace(/_/g, ' ') + ' (UTC' + toOff + ')</span>';
      var big = outEl.querySelector('.big-text');
      if (!big) { big = document.createElement('div'); big.className = 'big-text'; outEl.appendChild(big); }
      big.textContent = fromTime + '  →  ' + toTime;
      showToast('转换完成');
    }

    function swapTz() {
      var from = document.getElementById('fromTz');
      var to = document.getElementById('toTz');
      var tmp = from.value;
      from.value = to.value;
      to.value = tmp;
      convertTz();
    }

    function findMeetingTimes() {
      var tz1 = document.getElementById('meetingTz1').value;
      var tz2 = document.getElementById('meetingTz2').value;
      var tz3 = document.getElementById('meetingTz3').value;
      var grid = document.getElementById('meetingGrid');

      var hours = [];
      for (var h = 0; h < 24; h++) {
        var d = new Date();
        d.setHours(h, 0, 0, 0);
        var h1 = parseInt(d.toLocaleString('en-US', { timeZone: tz1, hour: '2-digit', hour12: false }));
        var h2 = parseInt(d.toLocaleString('en-US', { timeZone: tz2, hour: '2-digit', hour12: false }));
        var h3 = parseInt(d.toLocaleString('en-US', { timeZone: tz3, hour: '2-digit', hour12: false }));
        var score = 0;
        if (h1 >= 8 && h1 <= 18) score++;
        if (h2 >= 8 && h2 <= 18) score++;
        if (h3 >= 8 && h3 <= 18) score++;
        hours.push({ hour: h, h1: h1, h2: h2, h3: h3, score: score });
      }

      grid.innerHTML = hours.map(function(item) {
        var cls = item.score >= 3 ? 'good' : item.score >= 2 ? 'ok' : 'bad';
        var label = item.score >= 3 ? '✓ 适合' : item.score >= 2 ? '~ 部分' : '✗ 不适合';
        return '<div class="meeting-slot ' + cls + '" onclick="showToast(\'UTC+' + item.hour + ':00\')">' +
          '<div class="slot-time">' + String(item.hour).padStart(2, '0') + ':00</div>' +
          '<div class="slot-label">' + label + '</div>' +
          '</div>';
      }).join('');
    }

    function searchTz() {
      var q = document.getElementById('tzSearch').value.trim().toLowerCase();
      var el = document.getElementById('tzSearchResult');
      if (!q) { el.innerHTML = ''; return; }

      var allTz = Timezone_supportedValuesOf ? Intl.supportedValuesOf('timeZone') : CITIES.map(function(c) { return c.tz; });
      var results = allTz.filter(function(t) { return t.toLowerCase().includes(q); }).slice(0, 10);
      if (!results.length) { el.innerHTML = '<span style="color:var(--text-muted);font-size:0.85rem;">未找到匹配时区</span>'; return; }

      var now = new Date();
      el.innerHTML = results.map(function(t) {
        var time = fmtTime(now, t);
        var off = getOffset(t);
        return '<div style="display:flex;justify-content:space-between;padding:0.4rem 0.75rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;margin-bottom:0.3rem;font-size:0.85rem;">' +
          '<span>' + t.replace(/_/g, ' ') + '</span>' +
          '<span style="color:var(--primary);font-weight:600;">' + time + ' <span style="color:var(--text-muted);font-weight:400;">UTC' + off + '</span></span>' +
          '</div>';
      }).join('');
    }

    // Clock update every second
    function updateClocks() {
      renderClocks();
    }

    // Toast
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2500);
    }

    initSelects();
    renderClocks();
    setInterval(updateClocks, 1000);
  </script>
</body>
</html>
