        list=Object.values(EMOJIS).flat().filter(e=>e.toLowerCase().includes(q));
        if(list.length===0&&q.length>0){
          grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--text-muted)">未找到匹配的 Emoji</div>';
          count.textContent='0';
          return;
        }
      }
      grid.innerHTML=list.map(e=>`<div class="emoji-item" onclick="copyEmoji(this,'${e}')">${e}</div>`).join('');
      count.textContent=list.length+' 个 Emoji';
    }

    function copyEmoji(el,emoji){
      navigator.clipboard.writeText(emoji).then(()=>{
        el.classList.add('copied');
        showToast('已复制: '+emoji);
        setTimeout(()=>el.classList.remove('copied'),600);
      }).catch(()=>{});
    }

    function filterEmoji(){
      const q=document.getElementById('emojiSearch').value.trim();
      if(q){document.querySelectorAll('.emoji-cat').forEach(c=>c.classList.remove('active'));}
      const active=document.querySelector('.emoji-cat.active');
      renderEmoji(active?active.dataset.cat:currentCat,q);
    }

    // Init categories
    (function(){
      const cats=document.getElementById('emojiCats');
      Object.keys(EMOJIS).forEach(name=>{
        const btn=document.createElement('span');
        btn.className='emoji-cat'+(name===currentCat?' active':'');
        btn.textContent=name;
        btn.dataset.cat=name;
        btn.onclick=function(){
          document.querySelectorAll('.emoji-cat').forEach(c=>c.classList.remove('active'));
          this.classList.add('active');
          document.getElementById('emojiSearch').value='';
          renderEmoji(name,'');
        };
        cats.appendChild(btn);
      });
      renderEmoji(currentCat,'');
    })();
  </script>
</body>
</html>
