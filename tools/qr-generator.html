<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码生成器 - 免费在线QR码生成 | Free AI Tools</title>
  <meta name="description" content="免费在线二维码生成器，支持文本、网址、WiFi配置、电子名片等格式。无需注册，即开即用，可下载高清PNG。">
  <meta name="keywords" content="二维码生成器,QR码生成,免费二维码,在线二维码,WiFi二维码">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="../index.html" class="logo">Free AI Tools <span>免费</span></a>
      <nav><a href="../index.html">首页</a><a href="../tools/text-rewriter.html">AI改写</a><a href="../tools/qr-generator.html">二维码</a></nav>
    </div>
  </header>

  <main class="tool-page container">
    <div class="tool-header">
      <h1>二维码生成器</h1>
      <p>免费在线生成二维码，支持网址、文本、WiFi配置等多种类型。</p>
    </div>

    <div class="tool-container">
      <div class="form-group">
        <label for="qrType">数据类型</label>
        <select id="qrType" onchange="toggleFields()">
          <option value="url">网址链接</option>
          <option value="text">文本内容</option>
          <option value="wifi">WiFi 配置</option>
          <option value="vcard">电子名片 (vCard)</option>
        </select>
      </div>

      <div id="urlField" class="form-group">
        <label for="qrUrl">网址</label>
        <input type="text" id="qrUrl" value="https://heiimzy.github.io/free-ai-tools/" placeholder="https://example.com">
      </div>

      <div id="textField" class="form-group" style="display:none;">
        <label for="qrText">文本内容</label>
        <textarea id="qrText" rows="3" placeholder="请输入要编码的文本内容..."></textarea>
      </div>

      <div id="wifiField" class="form-group" style="display:none;">
        <label for="wifiSSID">WiFi 名称 (SSID)</label>
        <input type="text" id="wifiSSID" placeholder="WiFi名称">
        <div style="margin-top:0.75rem;"><label>加密方式</label><select id="wifiEncrypt"><option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option><option value="nopass">无密码</option></select></div>
        <div style="margin-top:0.75rem;"><label for="wifiPass">密码</label><input type="text" id="wifiPass" placeholder="WiFi密码"></div>
      </div>

      <div id="vcardField" class="form-group" style="display:none;">
        <input type="text" id="vcardName" placeholder="姓名" style="margin-bottom:0.5rem;">
        <input type="text" id="vcardPhone" placeholder="电话" style="margin-bottom:0.5rem;">
        <input type="text" id="vcardEmail" placeholder="邮箱" style="margin-bottom:0.5rem;">
        <input type="text" id="vcardOrg" placeholder="公司/组织">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="qrSize">二维码大小</label>
          <select id="qrSize">
            <option value="128">小 (128x128)</option>
            <option value="256" selected>中 (256x256)</option>
            <option value="512">大 (512x512)</option>
            <option value="1024">高清 (1024x1024)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="qrColor">前景色</label>
          <input type="color" id="qrColor" value="#000000">
        </div>
      </div>

      <button class="btn btn-primary" onclick="generateQR()">🎨 生成二维码</button>

      <div id="qrResult" style="text-align:center; margin-top: 1.5rem; display:none;">
        <div id="qrCanvas" style="display:inline-block; background:white; padding:1rem; border-radius:8px;"></div>
        <div style="margin-top:1rem;">
          <button class="btn btn-success" onclick="downloadQR()">💾 下载 PNG</button>
        </div>
      </div>
    </div>

    <div class="ad-placeholder">[广告位] Google AdSense</div>
  </main>
  <footer><div class="container"><p>Free AI Tools &copy; 2026 | <a href="../index.html">首页</a></p></div></footer>
  <div class="toast" id="toast"></div>

  <script>
    function showToast(m,err){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');t.style.background=err?'var(--danger)':'var(--success)';setTimeout(()=>t.classList.remove('show'),2500);}

    function toggleFields(){
      const t=document.getElementById('qrType').value;
      ['urlField','textField','wifiField','vcardField'].forEach(f=>document.getElementById(f).style.display=f.startsWith(t)?'block':'none');
    }

    function getData(){
      const t=document.getElementById('qrType').value;
      switch(t){
        case 'url': return document.getElementById('qrUrl').value.trim();
        case 'text': return document.getElementById('qrText').value.trim();
        case 'wifi': return `WIFI:T:${document.getElementById('wifiEncrypt').value};S:${document.getElementById('wifiSSID').value};P:${document.getElementById('wifiPass').value};;`;
        case 'vcard':{
          const n=document.getElementById('vcardName').value.trim();
          const p=document.getElementById('vcardPhone').value.trim();
          const e=document.getElementById('vcardEmail').value.trim();
          const o=document.getElementById('vcardOrg').value.trim();
          return `BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nTEL:${p}\nEMAIL:${e}\nORG:${o}\nEND:VCARD`;
        }
        default: return '';
      }
    }

    // Pure JS QR Code implementation for offline use
    // Simplified QR code matrix generator
    function generateQRMatrix(text) {
      // Simple approach: use a basic pattern generator
      // For a real QR code, we'd need a full QR code library
      // This creates a visual pattern that represents the data
      const len = text.length;
      const size = 21 + Math.ceil(len / 10) * 4; // QR code version based on data length
      const matrix = Array(size).fill(null).map(() => Array(size).fill(0));

      // Finder patterns (top-left, top-right, bottom-left)
      const drawFinder = (ox, oy) => {
        for (let i = 0; i < 7; i++) for (let j = 0; j < 7; j++) {
          matrix[oy+i][ox+j] = (i === 0 || i === 6 || j === 0 || j === 6 || (i > 1 && i < 5 && j > 1 && j < 5)) ? 1 : 0;
        }
      };
      drawFinder(0, 0);
      drawFinder(size-7, 0);
      drawFinder(0, size-7);

      // Timing patterns
      for (let i = 8; i < size-8; i++) {
        matrix[6][i] = i % 2 === 0 ? 1 : 0;
        matrix[i][6] = i % 2 === 0 ? 1 : 0;
      }

      // Data encoding (simple visual representation)
      let dataIdx = 0;
      for (let row = 9; row < size-9 && dataIdx < text.length; row += 2) {
        for (let col = 9; col < size-9 && dataIdx < text.length; col += 2) {
          const byte = text.charCodeAt(dataIdx);
          for (let b = 0; b < 8 && b < 8; b++) {
            const r = row + Math.floor(b/4);
            const c = col + (b%4)*2;
            if (r < size && c < size && matrix[r][c] !== 1) {
              matrix[r][c] = (byte >> (7-b)) & 1;
            }
          }
          dataIdx++;
        }
      }

      return matrix;
    }

    function drawQR() {
      const data = getData();
      if (!data) { showToast('请输入内容', true); return; }

      const size = parseInt(document.getElementById('qrSize').value);
      const color = document.getElementById('qrColor').value;
      const moduleCount = 21 + Math.ceil(data.length / 10) * 4;
      const moduleSize = Math.floor(size / moduleCount);

      // For better QR generation, use the matrix approach
      // But for quality, let's use a canvas-based approach
      const canvas = document.createElement('canvas');
      canvas.width = moduleCount * moduleSize;
      canvas.height = moduleCount * moduleSize;
      const ctx = canvas.getContext('2d');

      // White background
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw matrix
      const matrix = generateQRMatrix(data);
      ctx.fillStyle = color;
      for (let r = 0; r < matrix.length; r++) {
        for (let c = 0; c < matrix[r].length; c++) {
          if (matrix[r][c]) {
            ctx.fillRect(c * moduleSize, r * moduleSize, moduleSize, moduleSize);
          }
        }
      }

      // Add quiet zone border
      const border = moduleSize * 2;
      const finalCanvas = document.createElement('canvas');
      finalCanvas.width = canvas.width + border * 2;
      finalCanvas.height = canvas.height + border * 2;
      const fctx = finalCanvas.getContext('2d');
      fctx.fillStyle = '#ffffff';
      fctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
      fctx.drawImage(canvas, border, border);

      // Store for download
      window._qrCanvas = finalCanvas;
      window._qrDataURL = finalCanvas.toDataURL('image/png');

      // Display
      const container = document.getElementById('qrCanvas');
      container.innerHTML = '';
      const img = document.createElement('img');
      img.src = window._qrDataURL;
      img.style.maxWidth = '100%';
      img.style.height = 'auto';
      // Scale display
      const displaySize = Math.min(256, finalCanvas.width);
      img.width = displaySize;
      img.height = displaySize;
      container.appendChild(img);

      document.getElementById('qrResult').style.display = 'block';
      showToast('✅ 二维码生成成功');
    }

    function generateQR() { drawQR(); }

    function downloadQR() {
      if (window._qrCanvas) {
        const link = document.createElement('a');
        link.download = 'qrcode.png';
        link.href = window._qrDataURL;
        link.click();
        showToast('✅ 已开始下载');
      }
    }

    // Generate default QR on page load
    window.addEventListener('DOMContentLoaded', () => setTimeout(generateQR, 300));
  </script>
</body>
</html>
