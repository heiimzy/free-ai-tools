<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} - AI日报</title>
  <meta name="description" content="{{SUMMARY}}">
  <meta name="keywords" content="{{KEYWORDS}}">
  <link rel="stylesheet" href="../../style.css">
  <style>
    .post-article { max-width: 800px; margin: 0 auto; padding: 2rem 1rem 4rem; }
    .post-article .post-date { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.5rem; }
    .post-article .post-tags { display: flex; gap: 0.4rem; margin-bottom: 1.5rem; }
    .post-article .post-tags .tag { background: rgba(99,102,241,0.1); color: var(--primary); padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
    .post-article h1 { font-size: 1.8rem; margin-bottom: 0.5rem; line-height: 1.4; }
    .post-article h2 { font-size: 1.3rem; margin: 1.5rem 0 0.75rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--border); }
    .post-article h3 { font-size: 1.1rem; margin: 1.2rem 0 0.5rem; }
    .post-article p { line-height: 1.8; margin: 0.75rem 0; color: #e2e8f0; }
    .post-article ul, .post-article ol { padding-left: 1.5rem; margin: 0.75rem 0; line-height: 1.8; color: #e2e8f0; }
    .post-article li { margin: 0.3rem 0; }
    .post-article blockquote { border-left: 4px solid var(--primary); padding: 0.5rem 1rem; margin: 1rem 0; background: rgba(99,102,241,0.05); border-radius: 0 8px 8px 0; color: var(--text-muted); }
    .post-article a { color: var(--secondary); }
    .post-article hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .post-article .back-link { display: inline-block; margin-bottom: 2rem; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
    .post-article .back-link:hover { color: var(--primary); }
    @media (max-width: 768px) { .post-article h1 { font-size: 1.4rem; } }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="../../index.html" class="logo">Free AI Tools <span>免费</span></a>
      <nav><a href="../../index.html">工具</a><a href="../index.html">博客</a></nav>
    </div>
  </header>

  <article class="post-article">
    <a href="../index.html" class="back-link">← 返回博客首页</a>
    <div class="post-date">{{DATE}}</div>
    <div class="post-tags">{{TAGS_HTML}}</div>
    <h1>{{TITLE}}</h1>

    {{CONTENT}}
  </article>

  <footer>
    <div class="container">
      <p>AI日报 &copy; 2026 | <a href="../../index.html">工具站</a> | <a href="../index.html">博客首页</a> | <a href="../rss.xml">RSS订阅</a></p>
    </div>
  </footer>
</body>
</html>
