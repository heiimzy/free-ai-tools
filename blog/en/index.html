<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Daily — AI News, Tools, Monetization & Productivity | Free AI Tools Blog</title>
  <meta name="description" content="Hourly-updated AI blog covering the latest AI news, tool reviews, money-making methods, and productivity tips. English edition.">
  <meta name="keywords" content="AI news,AI tools,AI monetization,AI productivity,artificial intelligence">
  <link rel="alternate" type="application/rss+xml" title="AI Daily RSS" href="rss.xml">
  <link rel="stylesheet" href="../../style.css">
  <style>
    .blog-header { text-align: center; padding: 3rem 1rem 2rem; }
    .blog-header h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
    .blog-header p { color: var(--text-muted); max-width: 600px; margin: 0 auto; }
    .blog-header .subtitle { color: var(--secondary); font-size: 0.9rem; margin-top: 0.5rem; }
    .post-list { max-width: 800px; margin: 0 auto; padding: 0 0 3rem; }
    .post-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s, transform 0.2s;
      cursor: pointer;
    }
    .post-item:hover { border-color: var(--secondary); transform: translateX(4px); }
    .post-item .date { color: var(--text-muted); font-size: 0.8rem; }
    .post-item h2 { font-size: 1.2rem; margin: 0.3rem 0; color: var(--text); }
    .post-item .summary { color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; margin-top: 0.5rem; }
    .post-item .tags { margin-top: 0.75rem; display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .post-item .tag {
      background: rgba(6,182,212,0.1);
      color: var(--secondary);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
    }
    .post-item .read-more { color: var(--primary); font-size: 0.85rem; margin-top: 0.5rem; display: inline-block; }
    .loading { text-align: center; padding: 3rem; color: var(--text-muted); }
    .loading .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--secondary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 0.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 2rem; }
    .pagination button {
      background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
      padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-family: inherit;
    }
    .pagination button:hover { border-color: var(--secondary); }
    .pagination button.active { background: var(--secondary); border-color: var(--secondary); }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .post-count { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1rem; }
    .category-nav { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .category-nav button {
      background: transparent; border: 1px solid var(--border); color: var(--text-muted);
      padding: 0.4rem 1rem; border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-family: inherit;
      transition: all 0.2s;
    }
    .category-nav button:hover { border-color: var(--secondary); color: var(--text); }
    .category-nav button.active { background: var(--secondary); border-color: var(--secondary); color: white; }

    .lang-banner { background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.3); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1.5rem; text-align: center; color: var(--text-muted); font-size: 0.85rem; }
    .lang-banner a { color: var(--secondary); }

    @media (max-width: 768px) { .blog-header h1 { font-size: 1.6rem; } .post-item { padding: 1rem; } }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="../../index.html" class="logo">Free AI Tools <span>free</span></a>
      <nav>
        <a href="../../index.html">Tools</a>
        <a href="../index.html">中文博客</a>
        <a href="index.html">Blog(EN)</a>
        <a href="rss.xml">RSS</a>
      </nav>
    </div>
  </header>

  <section class="blog-header">
    <div class="container">
      <h1>AI Daily</h1>
      <p>Tracking the latest in AI — News · Tools · Monetization · Productivity</p>
      <div class="subtitle">🕐 Auto-updated every hour · Never miss a beat</div>
    </div>
  </section>

  <div class="container">
    <div class="lang-banner">
      🇨🇳 <a href="../index.html">中文版</a> also available — Same content, different language.
    </div>
  </div>

  <div class="category-nav" id="categoryNav">
    <button data-cat="all" class="active">All</button>
    <button data-cat="news">📰 News</button>
    <button data-cat="tools">🛠 Tools</button>
    <button data-cat="monetization">💰 Monetization</button>
    <button data-cat="productivity">⚡ Productivity</button>
  </div>

  <main class="container">
    <div class="post-count" id="postCount"></div>
    <div class="post-list" id="postList">
      <div class="loading"><div class="spinner"></div>Loading posts...</div>
    </div>
    <div class="pagination" id="pagination"></div>
  </main>

  <footer>
    <div class="container">
      <p>AI Daily &copy; 2026 | <a href="../../index.html">Free AI Tools</a> | <a href="../index.html">中文版</a> | <a href="rss.xml">RSS</a></p>
    </div>
  </footer>

  <script>
    const POSTS_PER_PAGE = 20;
    let allPosts = [];
    let currentPage = 1;
    let currentCategory = 'all';

    async function loadPosts() {
      try {
        const res = await fetch('../posts.json?_=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        allPosts = Array.isArray(data) ? data.filter(p => p.en) : [];
        render();
      } catch(e) {
        document.getElementById('postList').innerHTML = '<div class="loading" style="color:var(--danger);">⚠️ No posts yet. Check back after the next update...</div>';
      }
    }

    function filterPosts(cat) {
      if (cat === 'all') return allPosts;
      const catLower = cat.toLowerCase();
      return allPosts.filter(p => {
        const tags = (p.en.tags || []).map(t => t.toLowerCase());
        return tags.includes(catLower);
      });
    }

    function render() {
      const filtered = filterPosts(currentCategory);
      const totalPages = Math.max(1, Math.ceil(filtered.length / POSTS_PER_PAGE));
      if (currentPage > totalPages) currentPage = totalPages;

      const start = (currentPage - 1) * POSTS_PER_PAGE;
      const pagePosts = filtered.slice(start, start + POSTS_PER_PAGE);

      document.getElementById('postCount').textContent = `${filtered.length} posts total`;

      const list = document.getElementById('postList');
      if (pagePosts.length === 0) {
        list.innerHTML = '<div class="loading">📭 No posts yet. Waiting for next auto-update...</div>';
      } else {
        list.innerHTML = pagePosts.map(p => {
          const tags = (p.en.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
          return `<div class="post-item" onclick="openPost('${p.en.file || ''}')">
            <div class="date">${p.date || ''}</div>
            <h2>${p.en.title || 'Untitled'}</h2>
            <div class="summary">${p.en.summary || ''}</div>
            <div class="tags">${tags}</div>
            <span class="read-more">Read full article →</span>
          </div>`;
        }).join('');
      }

      const pg = document.getElementById('pagination');
      if (totalPages <= 1) { pg.innerHTML = ''; return; }
      let phtml = `<button ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">← Previous</button>`;
      for (let i = 1; i <= totalPages; i++) {
        phtml += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
      }
      phtml += `<button ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">Next →</button>`;
      pg.innerHTML = phtml;
    }

    function goPage(n) { currentPage = n; render(); window.scrollTo({top: 0, behavior: 'smooth'}); }
    function openPost(file) { if (file) window.location.href = '../' + file; }

    document.getElementById('categoryNav').addEventListener('click', function(e) {
      if (e.target.tagName === 'BUTTON') {
        document.querySelectorAll('#categoryNav button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentCategory = e.target.dataset.cat || 'all';
        currentPage = 1;
        render();
      }
    });

    loadPosts();
  </script>
</body>
</html>
